{{ define "content" }}
<form class="filters" id="metrics-time"
      hx-get="/metrics/list"
      hx-target="#metrics-list"
      hx-trigger="submit, change from:input[name=bucket]">
  <label>From
    <input type="text" name="from" value="{{ .From }}" placeholder="2026-05-13T10:00:00Z">
  </label>
  <label>To
    <input type="text" name="to" value="{{ .To }}" placeholder="2026-05-13T11:00:00Z">
  </label>
  <label>Bucket seconds
    <input type="number" name="bucket" value="{{ .BucketSecs }}" min="5" max="3600">
  </label>
  {{ template "presets" }}
  <button type="submit">Refresh list</button>
</form>

<section class="metrics-layout">
  <aside class="metrics-list-wrap">
    <h3>Available series</h3>
    <div id="metrics-list"
         hx-get="/metrics/list{{ .Query }}"
         hx-trigger="load">
      <div class="summary">loading…</div>
    </div>
  </aside>

  <div class="metrics-chart-wrap">
    <canvas id="metrics-canvas" height="120"></canvas>
    <div id="metrics-chart">
      <div class="empty">Select one or more series on the left to plot.</div>
    </div>
  </div>
</section>

<script>
(function () {
  let chart = null;

  function renderChart() {
    const target = document.getElementById('metrics-chart');
    const data = target.querySelector('script[type="application/json"]');
    if (!data) {
      if (chart) { chart.destroy(); chart = null; }
      return;
    }
    const payload = JSON.parse(data.textContent);
    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('metrics-canvas').getContext('2d'), {
      type: 'line',
      data: {
        labels: payload.labels,
        datasets: payload.series.map(function (s) {
          return { label: s.name, data: s.values, borderWidth: 1.5, tension: 0.2, pointRadius: 1 };
        })
      },
      options: {
        responsive: true,
        scales: { x: { ticks: { autoSkip: true, maxTicksLimit: 12 } } },
        plugins: { legend: { position: 'bottom' } }
      }
    });
  }

  document.body.addEventListener('htmx:afterSwap', function (evt) {
    if (evt.target.id === 'metrics-chart') renderChart();
  });
})();
</script>
{{ end }}
