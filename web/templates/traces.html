{{ define "content" }}
<form class="filters"
      hx-get="/traces/rows"
      hx-target="#traces-rows"
      hx-trigger="submit, change from:#service">
  <label>From
    <input type="text" name="from" value="{{ .From }}">
  </label>
  <label>To
    <input type="text" name="to" value="{{ .To }}">
  </label>
  <label>Service
    <select id="service" name="service">
      <option value="">all</option>
      {{ range .Services }}<option value="{{ . }}" {{ if eq . $.Service }}selected{{ end }}>{{ . }}</option>{{ end }}
    </select>
  </label>
  <label>Trace ID
    <input type="text" name="trace_id" value="{{ .TraceID }}">
  </label>
  <button type="submit">Search</button>
</form>

<div id="traces-rows" hx-get="/traces/rows{{ .Query }}" hx-trigger="load">
  <div class="summary">loading…</div>
</div>
{{ end }}
